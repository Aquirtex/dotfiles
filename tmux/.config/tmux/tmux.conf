# ─────────────────────────────────────────────
# TERMINAL
# True Color Support für Catppuccin/Tokyo Night
# ─────────────────────────────────────────────
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"

# ─────────────────────────────────────────────
# PREFIX
# Ctrl+A statt Ctrl+B — ergonomischer
# DE-Layout freundlich, kein Sonderzeichen
# ─────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─────────────────────────────────────────────
# ALLGEMEIN
# ─────────────────────────────────────────────
set -g mouse on                    # Maus für Pane-Resize + Scroll
set -g history-limit 10000         # Scrollback Buffer
set -g base-index 1                # Windows bei 1 starten
set -g pane-base-index 1           # Panes bei 1 starten
set -g renumber-windows on         # Windows neu nummerieren nach close
set -g automatic-rename off        # Window-Namen nicht auto überschreiben

# ─────────────────────────────────────────────
# SPLITS
# v = vertikal (links/rechts)
# s = horizontal (oben/unten)
# DE-Layout freundlich — kein " oder %
# Öffnet im aktuellen Verzeichnis
# ─────────────────────────────────────────────
unbind '"'
unbind %
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# ─────────────────────────────────────────────
# PANE NAVIGATION
# Vim-style mit hjkl
# ─────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─────────────────────────────────────────────
# PANE RESIZE
# -r = repeatable, Prefix einmal dann
# H/J/K/L mehrfach ohne Prefix
# ─────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─────────────────────────────────────────────
# WINDOW NAVIGATION
# Prefix + Ctrl+A → letztes Window
# ─────────────────────────────────────────────
bind C-a last-window

# ─────────────────────────────────────────────
# VI MODE
# Copy-Mode mit vim Keybindings
# v = selection, Ctrl+V = block, y = yank
# ─────────────────────────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ─────────────────────────────────────────────
# CONFIG RELOAD
# Prefix + r → tmux.conf neu laden
# ─────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ─────────────────────────────────────────────
# CATPPUCCIN THEME
# Manuell installiert — TPM hat Name-Conflict
# Installation:
#   mkdir -p ~/.config/tmux/plugins/catppuccin
#   git clone -b v2.1.3 https://github.com/catppuccin/tmux.git \
#     ~/.config/tmux/plugins/catppuccin/tmux
# ─────────────────────────────────────────────
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g window-status-current-format " #W "
set -g window-status-format " #W "

# Status Line
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text "%H:%M"


# Catppuccin laden — muss vor tpm run stehen
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g window-status-current-format "#[fg=#11111b,bg=#{@thm_mauve}]#[fg=#181825,reverse]#[none]#I #[fg=#cdd6f4,bg=#{@thm_surface_1}] #W#[fg=#181825,reverse]#[none]"
set -g window-status-format "#[fg=#11111b,bg=#{@thm_overlay_2}]#[fg=#181825,reverse]#[none]#I #[fg=#cdd6f4,bg=#{@thm_surface_0}] #W#[fg=#181825,reverse]#[none]"


# ─────────────────────────────────────────────
# PLUGINS (tpm)
# tpm → Plugin Manager
# tmux-sensible → sinnvolle Defaults
# tmux-yank → System-Clipboard Integration
#
# Plugin install: Prefix + I
# Plugin update:  Prefix + U
# ─────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# tpm initialisieren — muss am Ende stehen
run '~/.config/tmux/plugins/tpm/tpm'
